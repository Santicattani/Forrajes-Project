<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forrajes — Plataforma de Producción</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#4a7c59',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen font-mono">

  <header class="border-b border-neutral-800 px-4 md:px-8 py-4 md:py-5 flex items-center justify-between">
    <span class="text-accent font-semibold tracking-widest uppercase text-sm">Forrajes</span>
    <nav class="flex gap-4 md:gap-6 text-sm text-neutral-400">
      <a href="login.html" class="hover:text-neutral-100 transition">Iniciar sesión</a>
      <a href="register.html" class="hover:text-neutral-100 transition">Registrarse</a>
    </nav>
  </header>

  <main class="max-w-2xl mx-auto px-4 md:px-8 py-16 md:py-24 text-center">
    <p class="text-accent text-xs tracking-widest uppercase mb-4">Plataforma agropecuaria</p>
    <h1 class="text-4xl font-semibold tracking-tight mb-6 text-neutral-50">
      Optimizá tu producción de forrajes
    </h1>
    <p class="text-neutral-400 text-base leading-relaxed mb-10">
      Calculá tu margen operativo, consultá días ideales de corte según el clima
      y recibí alertas por email cuando las condiciones cambien.
    </p>
    <a href="register.html" class="bg-accent hover:bg-opacity-80 transition text-white text-sm px-6 py-3 rounded">
      Crear cuenta
    </a>
  </main>

</body>
</html>
